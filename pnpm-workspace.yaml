packages:
  - packages/*
  - apps/*

allowBuilds:
  sharp: set this to true or false

# Native postinstall scripts, explicitly allow-listed (supply-chain hygiene).
# Both are decided so pnpm's verify-deps-before-run check stays green when Turbo
# shells out to `pnpm run`. esbuild -> Vite; sharp -> Next image (unused but present).
onlyBuiltDependencies:
  - esbuild
  - sharp
